name: CI

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 1. Package installs cleanly ────────────────────────────────────────
      - name: pip install
        run: pip install .

      # ── 2. All modules import without errors ───────────────────────────────
      - name: Verify imports
        run: python tests/test_imports.py

      # ── 3. Install scripts work end-to-end (using local checkout) ──────────
      - name: Run install.sh
        if: runner.os != 'Windows'
        env:
          SPTUI_REPO: "."
        run: bash install.sh

      - name: Run install.ps1
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SPTUI_REPO: "."
        run: .\install.ps1

      # ── 4. sptui command is registered after install ───────────────────────
      - name: Verify sptui registered in pipx
        run: python tests/test_pipx.py

  # ── Release: runs only on version tags, after all tests pass ──────────────
  release:
    name: Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Install

            **Linux / macOS**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/kofolmarko/sptui/main/install.sh | bash
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://raw.githubusercontent.com/kofolmarko/sptui/main/install.ps1 | iex
            ```

            Requires Python 3.10+.
