name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sptui-linux-x86_64
          - os: windows-latest
            artifact: sptui-windows-x86_64.exe
          - os: macos-13
            artifact: sptui-macos-x86_64
          - os: macos-latest
            artifact: sptui-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller .

      - name: Build binary
        run: >
          pyinstaller
          --onefile
          --name sptui
          --collect-all textual
          sptui/__main__.py

      - name: Rename artifact
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            mv dist/sptui.exe dist/${{ matrix.artifact }}
          else
            mv dist/sptui dist/${{ matrix.artifact }}
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
